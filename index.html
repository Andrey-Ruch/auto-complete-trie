<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AutoComplete Trie</title>
        <link rel="stylesheet" href="styles.css" />
        <script type="module" src="src/web.js"></script>
    </head>
    <body>
        <main class="container">
            <h1>AutoComplete Trie</h1>

            <div class="add-row">
                <input
                    id="add-input"
                    type="text"
                    autocomplete="off"
                    placeholder="Enter a word to add to dictionary"
                />
                <button id="add-btn" type="button">Add Word</button>
            </div>

            <div id="feedback" role="status" hidden></div>

            <div class="search-area">
                <input
                    id="search-input"
                    type="text"
                    autocomplete="off"
                    placeholder="Start typing to see suggestions..."
                />
                <ul id="suggestions" hidden></ul>
            </div>

            <div class="stats">
                <span id="word-count">0</span>
                <span class="stats__label">Words in Dictionary</span>
            </div>
        </main>
    </body>
</html>
